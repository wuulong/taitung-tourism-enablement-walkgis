name: WalkGIS DB Auto-Sync

on:
  push:
    branches:
      - main
    paths:
      - 'features/**'
      - 'maps/**'

# 必須加入權限設定，允許 Action 寫入內容
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Sync Database
        run: |
          python3 scripts/sync_walkgis_db.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add walkgis.db
          # 檢查是否有變動，有的話才 commit & push
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "auto: sync walkgis.db from markdown changes"
            git push
          else
            echo "No changes to commit"
          fi
